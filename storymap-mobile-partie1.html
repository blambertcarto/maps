<style>
#natoP1{
  --ocean:#dfe8ee; --paper:#eef3f8; --muted:#9db2c6; --line:rgba(255,255,255,.14);
  --accent:#5c92c9; --card-bg:rgba(10,17,27,.82); --ease:cubic-bezier(.66,0,.16,1); --cam:1150ms; --membres-opacity:.6;
  position:relative; z-index:0; font-family:'Gill Sans MT','Gill Sans','Gill Sans Nova','Calibri',system-ui,sans-serif; -webkit-font-smoothing:antialiased;
}
#natoP1 *{box-sizing:border-box}
#natoP1 .stage{position:sticky; top:0; height:100vh; overflow:hidden; perspective:1500px; perspective-origin:50% 42%;
  background:radial-gradient(120% 90% at 50% 30%, rgba(255,255,255,.35), rgba(200,214,224,0) 60%), var(--ocean)}
#natoP1 .camera{position:absolute; inset:0; transform-style:preserve-3d; transform:rotateX(0deg); transition:transform var(--cam) var(--ease); will-change:transform}
#natoP1 .map{position:absolute; top:50%; left:50%; transform-origin:50% 50%; transform:translate(-50%,-50%) scale(1) translate(0,0); transition:transform var(--cam) var(--ease); will-change:transform; box-shadow:0 40px 120px rgba(6,14,24,.35)}
#natoP1 .layer{position:absolute; inset:0; background-size:100% 100%; background-repeat:no-repeat}
#natoP1 .layer.tint{opacity:0; transition:opacity 900ms var(--ease)}
#natoP1 .layer.tint.on{opacity:1}
#natoP1 .layer.tint[data-tint="membres"].on{opacity:var(--membres-opacity)}
#natoP1 .layer.svglayer{width:100%; height:100%; opacity:0; transition:opacity 900ms var(--ease)}
#natoP1 .layer.svglayer.on{opacity:1}
#natoP1 .layer.mk{transform:translateY(7px); transition:opacity 900ms var(--ease), transform 750ms var(--ease)}
#natoP1 .layer.mk.on{transform:translateY(0)}
#natoP1 .labellayer{z-index:2}
#natoP1 .mers.on{opacity:.9}
#natoP1 .rota [id^="rota_Destroyer"]{opacity:0; transform-box:fill-box; transform-origin:center bottom; transition:opacity 550ms var(--ease)}
#natoP1 .rota.on [id^="rota_Destroyer"]{opacity:1; animation:bob_natoP1 3.8s ease-in-out infinite}
#natoP1 .rota.on [id="rota_Destroyer1"]{transition-delay:.15s; animation-delay:0s}
#natoP1 .rota.on [id="rota_Destroyer2"]{transition-delay:.38s; animation-delay:-.95s}
#natoP1 .rota.on [id="rota_Destroyer3"]{transition-delay:.61s; animation-delay:-1.9s}
#natoP1 .rota.on [id="rota_Destroyer4"]{transition-delay:.84s; animation-delay:-2.85s}
@keyframes bob_natoP1{0%,100%{transform:translateY(0) rotate(0)} 50%{transform:translateY(-1.6px) rotate(1.2deg)}}
@media (prefers-reduced-motion:reduce){#natoP1 .rota.on [id^="rota_Destroyer"]{animation:none}}
#natoP1 .awacs [id^="awacs_AWACS"]:not([id="awacs_AWACS"]){opacity:0; transform-box:fill-box; transform-origin:center; transition:opacity 600ms var(--ease)}
#natoP1 .awacs.on [id^="awacs_AWACS"]:not([id="awacs_AWACS"]){opacity:1; animation:orbit_natoP1 7s linear infinite}
#natoP1 .awacs.on [id="awacs_AWACS1"]{transition-delay:.10s; animation-delay:0s; animation-duration:7s}
#natoP1 .awacs.on [id="awacs_AWACS1-2"]{transition-delay:.28s; animation-delay:-1.7s; animation-duration:6.2s}
#natoP1 .awacs.on [id="awacs_AWACS1-3"]{transition-delay:.46s; animation-delay:-3.4s; animation-duration:7.7s}
#natoP1 .awacs.on [id="awacs_AWACS1-4"]{transition-delay:.64s; animation-delay:-5.1s; animation-duration:6.6s}
@keyframes orbit_natoP1{0%{transform:translate(5px,0)}12.5%{transform:translate(3.5px,3.5px)}25%{transform:translate(0,5px)}37.5%{transform:translate(-3.5px,3.5px)}50%{transform:translate(-5px,0)}62.5%{transform:translate(-3.5px,-3.5px)}75%{transform:translate(0,-5px)}87.5%{transform:translate(3.5px,-3.5px)}100%{transform:translate(5px,0)}}
#natoP1 .awacs .ping{fill:none; stroke:#8fbce0; stroke-width:1.6; transform-box:fill-box; transform-origin:center; opacity:0}
#natoP1 .awacs.on .ping{animation:awacsping_natoP1 4.2s ease-out infinite}
#natoP1 .awacs.on .p1{animation-delay:0s}
#natoP1 .awacs.on .p2{animation-delay:-1.05s}
#natoP1 .awacs.on .p3{animation-delay:-2.1s}
#natoP1 .awacs.on .p4{animation-delay:-3.15s}
@keyframes awacsping_natoP1{0%{transform:scale(.15); opacity:.7} 70%{opacity:0} 100%{transform:scale(4.2); opacity:0}}
@media (prefers-reduced-motion:reduce){#natoP1 .awacs.on [id^="awacs_AWACS"], #natoP1 .awacs.on .ping{animation:none}}
#natoP1 .vignette{position:absolute; inset:0; pointer-events:none; z-index:2; background:radial-gradient(70% 70% at 50% 48%, rgba(8,14,22,0) 55%, rgba(8,14,22,.55) 100%); opacity:0; transition:opacity var(--cam) var(--ease)}
#natoP1 .progress{position:absolute; top:0; left:0; right:0; height:3px; z-index:6; display:flex; gap:3px; padding:0 4px}
#natoP1 .seg{flex:1; background:rgba(255,255,255,.16); border-radius:2px; overflow:hidden}
#natoP1 .seg i{display:block; height:100%; width:0; background:var(--accent); transition:width 220ms linear}
#natoP1 .globe{position:absolute; z-index:3; left:-6%; top:50%; width:min(46%,560px); aspect-ratio:1/1; transform:translateY(-50%) translateX(-30px) scale(.94); opacity:0; pointer-events:none; transition:opacity 850ms var(--ease), transform 1100ms var(--ease); filter:drop-shadow(0 30px 60px rgba(6,14,24,.45))}
#natoP1 .globe.on{opacity:1; transform:translateY(-50%) translateX(0) scale(1)}
#natoP1 .globe img{position:absolute; inset:0; width:100%; height:100%}
#natoP1 .globe .am{opacity:0; transition:opacity 900ms var(--ease) 350ms}
#natoP1 .globe.on .am{opacity:1}
#natoP1 .globe .halo{position:absolute; inset:-4%; border-radius:50%; box-shadow:0 0 0 1px rgba(255,255,255,.35), inset 0 0 60px rgba(255,255,255,.25)}

#natoP1 .svgov{position:absolute; inset:0; width:100%; height:100%; z-index:1; pointer-events:none; opacity:0; transition:opacity 500ms var(--ease)}
#natoP1 .svgov.on{opacity:1}
#natoP1 .anim-expand .ring-spin{transform-box:fill-box; transform-origin:center}
#natoP1 .anim-expand.on .ring-spin{animation:spin_natoP1 26s linear infinite}
#natoP1 .anim-expand.on .ring-spin.r2{animation-duration:19s; animation-direction:reverse}
#natoP1 .anim-expand .ring{fill:none; stroke-linecap:round; stroke-linejoin:round; transform-box:fill-box; transform-origin:center; transform:scale(.12); opacity:0; transition:transform 1000ms var(--ease), opacity 700ms var(--ease)}
#natoP1 .anim-expand.on .ring{transform:scale(1); opacity:1}
#natoP1 .anim-expand.on .r2 .ring{transition-delay:300ms}
@keyframes spin_natoP1{to{transform:rotate(360deg)}}
#natoP1 .anim-draw .p{stroke-dasharray:1; stroke-dashoffset:1; transition:stroke-dashoffset 1600ms var(--ease)}
#natoP1 .anim-draw.on .p{stroke-dashoffset:0}
#natoP1 .anim-wipe{clip-path:inset(0 0 100% 0); transition:clip-path 1600ms var(--ease)}
#natoP1 .anim-wipe.on{clip-path:inset(0 0 0 0)}
#natoP1 .front.on .p{animation:frontglow_natoP1 2.6s ease-in-out infinite}
@keyframes frontglow_natoP1{0%,100%{filter:drop-shadow(0 0 1px rgba(178,54,34,.45))} 50%{filter:drop-shadow(0 0 5px rgba(178,54,34,.95))}}
#natoP1 .front.on .pd path{animation:frontdots_natoP1 1s linear infinite}
@keyframes frontdots_natoP1{to{stroke-dashoffset:-4.1}}
@media (prefers-reduced-motion:reduce){#natoP1 .anim-expand.on .ring-spin{animation:none}}
#natoP1 .sm3 .r2 .ring{stroke:#e8d480} .sm3 .ring{stroke:#677c89;stroke-width:2.4;stroke-dasharray:2 7}
#natoP1 .steps{position:relative; z-index:4; margin-top:-100vh}
#natoP1 .step{min-height:100vh; display:flex; align-items:flex-end; padding:0 clamp(20px,5vw,90px) clamp(60px,12vh,120px); pointer-events:none}
#natoP1 .step.right{justify-content:flex-end}
#natoP1 .step.center{align-items:center; justify-content:center; text-align:center}
#natoP1 .step.long{min-height:185vh; padding-bottom:105vh}
#natoP1 .card{pointer-events:auto; max-width:440px; background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,0) 45%), rgba(12,19,29,.66); backdrop-filter:blur(16px) saturate(1.3); -webkit-backdrop-filter:blur(16px) saturate(1.3); border:1px solid rgba(255,255,255,.17); border-left:3px solid var(--accent); border-radius:6px; padding:24px 30px 26px; box-shadow:0 26px 64px rgba(6,12,22,.46), inset 0 1px 0 rgba(255,255,255,.2); opacity:0; transform:translateY(26px); transition:opacity 700ms var(--ease), transform 700ms var(--ease)}
#natoP1 .step.active .card{opacity:1; transform:translateY(0)}
#natoP1 .eyebrow{font:600 11.5px/1 'Gill Sans MT','Gill Sans','Gill Sans Nova','Calibri',sans-serif; letter-spacing:.16em; text-transform:uppercase; color:var(--accent); margin:0 0 12px; display:flex; align-items:center; gap:10px}
